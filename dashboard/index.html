<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacMini AI Lab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #1e293b;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #334155;
        }
        h1 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 2rem;
        }
        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        a.btn {
            display: block;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.2s;
        }
        a.btn:hover {
            transform: translateY(-2px);
        }
        .btn-komodo {
            background-color: #10b981;
            color: #022c22;
        }
        .btn-komodo:hover {
            background-color: #34d399;
        }
        .btn-ai {
            background-color: #6366f1;
            color: #e0e7ff;
        }
        .btn-ai:hover {
            background-color: #818cf8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 MacMini AI Lab</h1>
        <p>Centro de Control y Orquestación</p>
        
        <div class="button-group">
            <a href="http://macmini-lab.local:9120" class="btn btn-komodo">🦎 Orquestador (Komodo)</a>
            
            <a href="https://macmini-lab.local/openclaw/" class="btn btn-ai">🤖 Agente AI (OpenClaw)</a>
        </div>
    </div>
</body>
</html>
