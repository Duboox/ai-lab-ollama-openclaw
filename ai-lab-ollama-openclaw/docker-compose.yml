networks:
  ai_network:
    driver: bridge

services:
  # --- Motor de Inferencia (Ollama) ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - ai_network
    volumes:
      - ./data/ollama:/root/.ollama
    restart: always
    environment:
      - OLLAMA_KEEP_ALIVE=5m
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  # --- Agente Autónomo (OpenClaw) ---
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    networks:
      - ai_network
    depends_on:
      - ollama
    restart: always
    shm_size: '2gb' # Crítico para evitar crasheos de Chromium
    volumes:
      - ./data/openclaw-config:/home/node/.openclaw 
      - ./data/openclaw-workspace:/home/node/.openclaw/workspace
      - /dev/shm:/dev/shm
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_PROVIDER=ollama
      - LLM_MODEL=llama3.2:1b
      - OPENCLAW_GATEWAY_BIND=lan 
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # --- Reverse Proxy (Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    networks:
      - ai_network
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - openclaw
    restart: always