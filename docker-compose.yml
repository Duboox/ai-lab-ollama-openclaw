services:
  komodo-db:
    image: mongo:7
    container_name: komodo-db
    restart: always
    volumes:
      - ./mongo-data:/data/db

  komodo-core:
    image: mbecker/komodo:latest
    container_name: komodo-core
    restart: always
    ports:
      - "9123:9123"
    environment:
      # Conexión interna entre contenedores
      - MONGO_URL=mongodb://komodo-db:27017
      - DB_NAME=komodo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./komodo-config:/config
    depends_on:
      - komodo-db