networks:
  ai_network:
    driver: bridge

services:
  # --- Motor de Inferencia (Ollama) ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - ai_network
    volumes:
      - ./data/ollama:/root/.ollama
    restart: always
    environment:
      - OLLAMA_KEEP_ALIVE=5m
      # - OLLAMA_KEEP_ALIVE=-1 Obliga a que viva en la ram
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '1.5'

  # --- Agente Autónomo (OpenClaw) ---
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    networks:
      - ai_network
    depends_on:
      - ollama
    restart: always
    shm_size: '2gb' # Crítico para evitar crasheos de Chromium
    ports:
      - "18789:18789"
    volumes:
      - ./data/openclaw-config:/home/node/.openclaw 
      - ./data/openclaw-workspace:/home/node/.openclaw/workspace
      - /dev/shm:/dev/shm
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_PROVIDER=ollama
      - LLM_MODEL=llama3.2:1b
      - OPENCLAW_GATEWAY_BIND=lan 
      - LLM_IDLE_TIMEOUT_MS=600000
      - OPENCLAW_LLM_IDLE_TIMEOUT=600000
      - OLLAMA_TIMEOUT=600000
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
  nginx:
    image: nginx:alpine
    container_name: openclaw_proxy
    networks:
      - ai_network
    ports:
      - "443:443" # Este Nginx es el dueño absoluto del tráfico HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro # La carpeta de los certificados SSL
    depends_on:
      - openclaw
    restart: always
  ollama-setup:
    image: ollama/ollama:latest
    container_name: ollama_setup
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no" # Queremos que muera elegantemente cuando termine, no que reviva
    command: >
      sh -c "
      echo 'Esperando a que el servidor de Ollama arranque...';
      sleep 5;
      while ! ollama list > /dev/null 2>&1; do sleep 2; done;
      echo 'Ollama en línea. Construyendo el modelo Lite (num_ctx 2048)...';
      echo 'FROM llama3.2:1b' > /tmp/Modelfile;
      echo 'PARAMETER num_ctx 2048' >> /tmp/Modelfile;
      ollama create llama3.2:lite -f /tmp/Modelfile;
      echo '¡Lobotomía táctica completada! Modelo llama3.2:lite listo en memoria.';
      "