version: '3.8'

networks:
  ai_network:
    driver: bridge

services:
  # --- Motor de Inferencia (Ollama) ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - ai_network
    volumes:
      - ./data/ollama:/root/.ollama
    restart: always
    environment:
      - OLLAMA_KEEP_ALIVE=5m
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  # --- Agente Autónomo (OpenClaw) ---
  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw
    networks:
      - ai_network
    depends_on:
      - ollama
    restart: always
    shm_size: '2gb' # Crítico para evitar crasheos de Chromium
    volumes:
      - ./data/openclaw:/data
      - /dev/shm:/dev/shm
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_PROVIDER=ollama
      - LLM_MODEL=llama3.2:1b
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # --- Reverse Proxy (Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    networks:
      - ai_network
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - openclaw
    restart: always

  # --- Resolución de Nombres (Avahi/mDNS) ---
  avahi:
    image: cloudposse/avahi:latest
    container_name: avahi
    # Requerido para que el "grito" de mDNS salga a la red WiFi física
    network_mode: host 
    restart: always
    environment:
      # Responderá a http://openclaw-macmini.local
      - AVAHI_HOSTNAME=openclaw-macmini
      - AVAHI_DOMAIN=local