events {
    worker_connections 1024;
}

http {
    server {
        listen 443 ssl;
        server_name macmini-lab.local;

        # Certificados SSL generados previamente
        ssl_certificate /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;

        # 1. La ruta que pediste: /openclaw/
        location /openclaw/ {
            # El slash al final (18789/) es vital para que Nginx recorte el "/openclaw" 
            # antes de enviarlo al contenedor
            proxy_pass http://openclaw:18789/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Soporte WebSockets para el Chat
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 2. Fallback de seguridad para Assets Absolutos de la SPA
        location / {
            proxy_pass http://openclaw:18789/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}